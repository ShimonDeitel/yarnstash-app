<!doctype html>
<html><head><meta charset="utf-8"><title>Yarn Stash</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#130F0D;color:#f2f2f2;font-family:-apple-system,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.wrap{max-width:600px;padding:40px 20px}
h1{color:#C05A3E;font-size:2.4rem;margin-bottom:0.2em}
p{color:#cfcfcf;line-height:1.6}
a{color:#C05A3E;text-decoration:none}
.badge{display:inline-block;margin-top:24px;padding:10px 22px;border:1px solid #C05A3E;border-radius:24px;color:#C05A3E}
footer{margin-top:40px;font-size:0.85rem;color:#888}

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #C05A3E55 0%, #C05A3E00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style></head>
<body>
<div class="orb"></div><div class="wrap">
<h1>Yarn Stash</h1>
<p>Track a knitting or crochet yarn stash by weight and color.</p>
<p>Log yarn with fiber type and remaining yardage. Upgrade to Pro for unlimited entries and project-matching suggestions.</p>
<div class="badge">Coming soon to the App Store</div>
<footer><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Service</a><br>Contact: s0533495227@gmail.com</footer>
</div></body></html>
