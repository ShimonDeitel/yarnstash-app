name: Yarn Stash
options:
  bundleIdPrefix: com.shimondeitel.yarnstash
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Yarn Stash:
    type: application
    platform: iOS
    sources:
      - path: Yarn Stash
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.yarnstash
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Yarn Stash/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Yarn StashTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Yarn StashTests
      - path: Yarn Stash.storekit
    dependencies:
      - target: Yarn Stash
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.yarnstash.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Yarn StashUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Yarn StashUITests
    dependencies:
      - target: Yarn Stash
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.yarnstash.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Yarn Stash:
    build:
      targets:
        Yarn Stash: all
        Yarn StashTests: [test]
        Yarn StashUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Yarn Stash.storekit
    test:
      config: Debug
      storeKitConfiguration: Yarn Stash.storekit
      targets:
        - Yarn StashTests
        - Yarn StashUITests
    archive:
      config: Release
